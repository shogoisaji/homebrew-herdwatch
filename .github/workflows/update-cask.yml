name: Update Cask

on:
  workflow_dispatch:
    inputs:
      cask:
        description: "Cask name to update"
        required: true
        type: string
      tag:
        description: "Release tag (vX.Y.Z)"
        required: true
        type: string
      repository:
        description: "owner/repo hosting the release assets"
        required: true
        type: string
      artifact:
        description: "DMG artifact filename (e.g. HerdWatch-0.1.0.dmg)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  update-cask:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Validate inputs and resolve
        id: vars
        env:
          CASK: ${{ inputs.cask }}
          TAG: ${{ inputs.tag }}
          REPOSITORY: ${{ inputs.repository }}
          ARTIFACT: ${{ inputs.artifact }}
          ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail

          # --- Actor check: only repo owner can trigger ---
          repo_owner="${GITHUB_REPOSITORY_OWNER:-}"
          if [[ "$ACTOR" != "$repo_owner" ]]; then
            echo "error: actor '$ACTOR' is not authorized. Only '$repo_owner' can trigger this workflow."
            exit 1
          fi

          # --- cask: only alphanumeric + hyphen ---
          if [[ ! "$CASK" =~ ^[a-z0-9-]+$ ]]; then
            echo "error: invalid cask name: $CASK"
            exit 1
          fi

          # --- tag: strict vX.Y.Z format ---
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "error: invalid tag format: $TAG (expected vX.Y.Z)"
            exit 1
          fi
          version="${TAG#v}"

          # --- repository: hardcoded whitelist ---
          # Only the official HerdWatch repo is allowed.
          allowed_repos="shogoisaji/HerdWatch"
          if [[ " $allowed_repos " != *" $REPOSITORY "* ]]; then
            echo "error: repository '$REPOSITORY' is not in the allowed list: $allowed_repos"
            exit 1
          fi

          # --- artifact: strict filename (alphanumeric, dots, dashes) ---
          if [[ ! "$ARTIFACT" =~ ^[A-Za-z0-9._-]+\.dmg$ ]]; then
            echo "error: invalid artifact filename: $ARTIFACT"
            exit 1
          fi

          # --- artifact must match the tag version ---
          expected_prefix="HerdWatch-${version}"
          if [[ "$ARTIFACT" != "${expected_prefix}.dmg" ]]; then
            echo "error: artifact '$ARTIFACT' does not match version $version (expected ${expected_prefix}.dmg)"
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "repository=$REPOSITORY" >> "$GITHUB_OUTPUT"
          echo "artifact=$ARTIFACT" >> "$GITHUB_OUTPUT"
          echo "cask=$CASK" >> "$GITHUB_OUTPUT"

      - name: Download DMG and compute sha256
        id: dmg
        env:
          REPOSITORY: ${{ steps.vars.outputs.repository }}
          TAG: ${{ steps.vars.outputs.tag }}
          ARTIFACT: ${{ steps.vars.outputs.artifact }}
        run: |
          set -euo pipefail
          url="https://github.com/${REPOSITORY}/releases/download/${TAG}/${ARTIFACT}"
          echo "Downloading: $url"
          curl -fsSL -o "$RUNNER_TEMP/dmg" "$url"
          checksum="$(sha256sum "$RUNNER_TEMP/dmg" | awk '{print $1}')"
          echo "sha256=$checksum" >> "$GITHUB_OUTPUT"
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Update Cask
        env:
          CASK: ${{ steps.vars.outputs.cask }}
          VERSION: ${{ steps.vars.outputs.version }}
          SHA256: ${{ steps.dmg.outputs.sha256 }}
          URL: ${{ steps.dmg.outputs.url }}
        run: |
          set -euo pipefail
          cask_path="Casks/${CASK}.rb"
          [[ -f "$cask_path" ]] || { echo "Cask not found: $cask_path"; exit 1; }
          ruby - "$cask_path" <<'RUBY'
            require "pathname"
            path = Pathname.new(ARGV[0])
            text = path.read
            text.sub!(/^  version ".*?"/, "  version \"#{ENV["VERSION"]}\"")
            text.sub!(/^  sha256 ".*?"/, "  sha256 \"#{ENV["SHA256"]}\"")
            text.sub!(/^  url ".*?"/, "  url \"#{ENV["URL"]}\"")
            path.write(text)
            puts text
          RUBY

      - name: Create branch, commit, and pull request
        env:
          CASK: ${{ steps.vars.outputs.cask }}
          VERSION: ${{ steps.vars.outputs.version }}
          TAG: ${{ steps.vars.outputs.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          branch="update-${CASK}-${VERSION}"

          # Check if Cask actually changed
          git add "Casks/${CASK}.rb"
          if git diff --cached --quiet; then
            echo "Cask ${CASK} is already at ${VERSION} — nothing to do."
            exit 0
          fi

          # Create branch and commit
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git commit -m "Update ${CASK} to ${VERSION}"

          # Push branch
          git push origin "$branch"

          # Create pull request
          pr_url="$(gh pr create \
            --title "Update ${CASK} to ${VERSION}" \
            --body "$(cat <<BODY
          ## Summary

          Automated Cask update triggered by [HerdWatch ${TAG}](https://github.com/shogoisaji/HerdWatch/releases/tag/${TAG}).

          - **Version**: ${VERSION}
          - **Source**: [DMG from release ${TAG}](https://github.com/shogoisaji/HerdWatch/releases/download/${TAG}/HerdWatch-${VERSION}.dmg)

          ## Verification

          - [ ] sha256 matches the released DMG
          - [ ] \`brew install --cask shogoisaji/herdwatch/${CASK}\` works

          ---
          Generated by \`update-cask.yml\` workflow.
          BODY
          )" \
            --base main \
            --head "$branch")"

          echo "Pull request created: $pr_url"
